version: '3.8'

services:
  backend:
    image: jhgfjhgfjhgf/culturemate-backend:latest
    container_name: culturemate-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILE: prod
    volumes:
      - ../images:/app/images
      - ../logs:/app/logs
    restart: unless-stopped
